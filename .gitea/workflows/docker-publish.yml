name: Build and Push Docker Image

# 触发条件：推送 v 开头的标签，如 v1.0.0
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: local-runner

    steps:
      # 步骤1：检出代码（直接用 git clone，不依赖 actions/checkout）
      - name: Checkout code
        run: |
          git clone --depth 1 --branch "${{ github.ref_name }}" \
            "${{ github.server_url }}/${{ github.repository }}.git" .
          git log -1 --oneline

      # 步骤2：设置多架构构建环境（QEMU + Buildx）
      - name: Set up multi-arch build
        run: |
          # 注册 QEMU 二进制，支持跨架构模拟
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
          # 创建或复用 buildx builder
          docker buildx create --name multiarch --use 2>/dev/null || docker buildx use multiarch
          docker buildx inspect --bootstrap

      # 步骤3：登录 Docker Hub
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
            docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # 步骤4：构建并推送多架构镜像
      - name: Build and push Docker image
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/cliproxyapi-dashboard"
          TAG="${{ github.ref_name }}"

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag "${IMAGE}:${TAG}" \
            --tag "${IMAGE}:latest" \
            --push \
            -f Dockerfile .
