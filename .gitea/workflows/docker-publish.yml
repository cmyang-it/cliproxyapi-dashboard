name: Build and Push Docker Image

# 触发条件：推送 v 开头的标签，如 v1.0.0
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: gitea-runner

    steps:
      # 步骤1：检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：增加 QEMU 模拟
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      # 步骤3：设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host
            env.http_proxy=socks5://127.0.0.1:10800
            env.https_proxy=socks5://127.0.0.1:10800

      # 步骤4：登录 Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 步骤5：提取 Docker 元数据（自动生成版本号和 latest 标签）
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/cliproxyapi-dashboard  # 替换为你的镜像名
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      # 步骤6：构建并推送 Docker 镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 【新增】将代理透传给 Dockerfile 内部，防止 npm install 报错
          build-args: |
            HTTP_PROXY=socks5://127.0.0.1:10800
            HTTPS_PROXY=socks5://127.0.0.1:10800