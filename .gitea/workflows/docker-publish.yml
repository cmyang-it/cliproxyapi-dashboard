name: Build and Push Docker Image

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: local-runner

    env:
      IMAGE_NAME: cliproxyapi-dashboard
      WORKDIR: source
      REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
      REF_NAME: ${{ github.ref_name }}

    steps:
      - name: Check runner dependencies
        run: |
          set -eu
          for cmd in git docker; do
            if ! command -v "$cmd" >/dev/null 2>&1; then
              echo "Missing required command: $cmd"
              exit 1
            fi
          done
          docker version
          docker buildx version

      - name: Checkout code without Node actions
        run: |
          set -eu
          rm -rf "$WORKDIR"
          git clone --depth 1 --branch "$REF_NAME" "$REPO_URL" "$WORKDIR"
          git -C "$WORKDIR" log -1 --oneline

      - name: Set up multi-arch build
        run: |
          set -eu
          docker run --rm --privileged tonistiigi/binfmt --install amd64,arm64
          docker buildx create --name cliproxyapi-builder --driver docker-container --use 2>/dev/null \
            || docker buildx use cliproxyapi-builder
          docker buildx inspect --bootstrap

      - name: Login to Docker Hub
        run: |
          set -eu
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
            docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and push Docker image
        run: |
          set -eu
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}"

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag "${IMAGE}:${REF_NAME}" \
            --tag "${IMAGE}:latest" \
            --push \
            -f "${WORKDIR}/Dockerfile" \
            "${WORKDIR}"
